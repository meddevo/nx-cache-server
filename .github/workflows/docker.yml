name: Build and push image

on:
  push:
    branches: [master, meddevo-integration]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/meddevo/nx-cache-server

permissions:
  contents: read
  packages: write

# A release push updates two refs (master + the vX.Y.Z tag), each firing this
# workflow for the same commit. Keying the group on the SHA puts both runs in
# one group; cancel-in-progress means the second (the tag, always pushed after
# master) supersedes the first, so a release builds once and publishes :X.Y.Z.
# Non-release master pushes are the only run in their group and are unaffected.
concurrency:
  group: docker-${{ github.sha }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      # PRs from forks can't push to GHCR; only log in / push on our own refs.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
